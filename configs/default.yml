assignment:
  enabled: true
  mode: dry-run
  trigger: "/assign"
  required_status_label: "status: ready for dev"
  in_progress_label: "status: in progress"
  allowed_labels:
    - "Good First Issue"
    - "skill: good first issue"
    - "skill: beginner"
    - "skill: intermediate"
  blocked_labels:
    - "status: blocked"
    - "status: in progress"
  max_active_assignments: 2
  require_unassigned_issue: true
  human_check:
    enabled: true
    strategy: github_user_type_and_spam_list
    spam_list_path: ".github/spam-list.txt"
    restricted_max_active_assignments: 1
    restricted_allowed_labels:
      - "Good First Issue"
      - "skill: good first issue"
  progression:
    enabled: true
    skill_hierarchy:
      - "Good First Issue"
      - "skill: good first issue"
      - "skill: beginner"
      - "skill: intermediate"
      - "skill: advanced"
    prerequisites:
      "Good First Issue":
        required_label: null
        required_count: 0
      "skill: good first issue":
        required_label: null
        required_count: 0
      "skill: beginner":
        required_label: "skill: good first issue"
        aliases:
          - "Good First Issue"
        required_count: 2
      "skill: intermediate":
        required_label: "skill: beginner"
        required_count: 3
      "skill: advanced":
        required_label: "skill: intermediate"
        required_count: 3
  require_human_review_for:
    - "skill: advanced"
  post_assignment_hooks:
    welcome_comment: true
    mentor_assignment: false
    ai_planner: false

pr_quality:
  enabled: true
  mode: dry-run
  checks:
    linked_issue: true
    dco: true
    gpg: true
    merge_conflict: true
    required_workflows: []
  output:
    style: check-summary
    update_existing: true

stale_management:
  enabled: true
  mode: dry-run
  issue_days_without_pr: 21
  pr_days_without_commit: 21
  activity_commands:
    - "/working"
  exempt_labels:
    - "status: blocked"

issue_creation:
  enabled: false
  mode: dry-run
  templates:
    - good_first_issue
    - beginner
    - intermediate
    - advanced

notifications:
  enabled: false
  channels:
    github_comment: true
    check_summary: true
    discord_webhook: false
    slack_webhook: false

audit:
  enabled: true
  include_config_rule: true
  include_source_event: true
